version: "3"

services:
  java-app:
    image: my-java-app:latest  # Use the Docker image you built
    labels:
      - "traefik.http.routers.java-app.rule=Host(`java-app.docker.localhost`)"
      - "traefik.http.services.java-app.loadbalancer.server.port=8080"
    networks:
      - traefik-net  # Connect to the shared network
    restart: always


networks:
  traefik-net:
    external: true  # Use the external network created earlier
